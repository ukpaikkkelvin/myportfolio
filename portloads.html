<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>

    .loader-overlay{
        width: 100%;
        height: 100%;
        display: flex;
        justify-content:center;
        align-items: center;
        flex-direction: column;
        z-index: 1001;
        position: fixed;
        top: 0;
        left: 0;
          background: radial-gradient(1000px 500px at -10% 10%, rgba(106, 13, 173, 0.459), transparent 60%),  #0b0b0f;
    }
    .loader{
        width:20%;
        height: 20%;
        display: flex;
        justify-content:center;
        align-items: center;
        flex-direction: column;
    }
    .circle{
        width: 70px;
        height: 70px;
        border-radius: 50%;
        border: 5px solid #6A0DAD ;
        border-top:5px solid #9B30FF ;
       animation: spin 1s linear infinite;
    }
    @keyframes spin {
        0%{
            transform: rotate(0deg);
        }
        100%{
            transform: rotate(360deg);
        }
    }
   .loader-overlay h1{
        font-family:verdana;
        color:#fff;
        
        text-align: center;
    }
</style>
<body>
    <div class="loader-overlay">
         <div class="loader">
                <div class="circle">

                </div>
                <!-- <div class="c1">
                    <div class="c2">

                    </div>
                </div> -->
         </div>
         <h1>LOADING <span>.</span><span>.</span><span>.</span></h1>
    </div>
</body>
</html>
